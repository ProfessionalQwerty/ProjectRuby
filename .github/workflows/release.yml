name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: release-win
          - os: macos-latest
            platform: mac
            artifact: release-mac
          - os: ubuntu-latest
            platform: linux
            artifact: release-linux

    runs-on: ${{ matrix.os }}

    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync package version from release tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          echo "Setting workspace version to ${VERSION}"
          node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            for (const p of ['package.json', 'desktop/package.json']) {
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = v;
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            }
          "
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Install dependencies
        run: npm ci

      - name: Generate app icons
        run: npm run generate-icons

      - name: Verify cloud build secrets
        shell: bash
        run: |
          if [ -z "$VITE_HF_ACCESS_TOKEN" ]; then
            echo "::error::VITE_HF_ACCESS_TOKEN is empty. Add it under repo Settings → Secrets → Actions (read token for your private HF Space)."
            exit 1
          fi
          echo "VITE_HF_ACCESS_TOKEN is set (length ${#VITE_HF_ACCESS_TOKEN})."
          if [ -z "$VITE_PRISM_CLIENT_KEY" ]; then
            echo "::error::VITE_PRISM_CLIENT_KEY is empty. Must match PRISM_CLIENT_API_KEY on the engine Space."
            exit 1
          fi
          echo "VITE_PRISM_CLIENT_KEY is set (length ${#VITE_PRISM_CLIENT_KEY})."
        env:
          VITE_HF_ACCESS_TOKEN: ${{ secrets.VITE_HF_ACCESS_TOKEN }}
          VITE_PRISM_CLIENT_KEY: ${{ secrets.VITE_PRISM_CLIENT_KEY }}

      - name: Write production env for Vite
        shell: bash
        run: |
          {
            echo "VITE_ELECTRON=1"
            echo "VITE_API_URL=https://yashshshsh-prism.hf.space"
            echo "VITE_PRISM_CLIENT_KEY=${VITE_PRISM_CLIENT_KEY}"
            echo "VITE_HF_ACCESS_TOKEN=${VITE_HF_ACCESS_TOKEN}"
            echo "VITE_DOWNLOAD_BASE_URL=${VITE_DOWNLOAD_BASE_URL}"
            echo "VITE_GITHUB_CLIENT_ID=${VITE_GITHUB_CLIENT_ID}"
          } > ui/.env.production.local
        env:
          VITE_PRISM_CLIENT_KEY: ${{ secrets.VITE_PRISM_CLIENT_KEY }}
          VITE_HF_ACCESS_TOKEN: ${{ secrets.VITE_HF_ACCESS_TOKEN }}
          VITE_DOWNLOAD_BASE_URL: ${{ secrets.VITE_DOWNLOAD_BASE_URL }}
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 desktop-file-utils

      - name: Build UI and desktop
        run: npm run build:electron && npm run verify-cloud-build
        env:
          VITE_ELECTRON: '1'
          VITE_API_URL: https://yashshshsh-prism.hf.space
          VITE_PRISM_CLIENT_KEY: ${{ secrets.VITE_PRISM_CLIENT_KEY }}
          VITE_HF_ACCESS_TOKEN: ${{ secrets.VITE_HF_ACCESS_TOKEN }}
          VITE_DOWNLOAD_BASE_URL: ${{ secrets.VITE_DOWNLOAD_BASE_URL }}
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}

      - name: Build installers
        if: matrix.platform == 'linux'
        run: npx electron-builder --config electron-builder.yml --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build installers
        if: matrix.platform != 'linux'
        run: npm run dist:only
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload unsigned Windows installer for SignPath
        if: matrix.platform == 'win'
        id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-unsigned
          path: release/PRISM-Setup-x64.exe
          if-no-files-found: error

      - name: Sign Windows installer via SignPath Foundation
        if: matrix.platform == 'win' && env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIG_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-installer

      - name: Replace with signed Windows installer
        if: matrix.platform == 'win' && env.SIGNPATH_API_TOKEN != ''
        shell: pwsh
        run: |
          $signed = Get-ChildItem -Path signed-installer -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $signed) { throw "SignPath did not return a signed .exe" }
          Copy-Item -Force $signed.FullName release/PRISM-Setup-x64.exe
          Write-Host "Using signed installer from SignPath"

      - name: Upload platform release files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: List release files
        run: ls -la release/

      - name: Verify auto-update metadata
        shell: bash
        run: |
          if [ ! -f release/latest.yml ] && [ ! -f release/latest-mac.yml ] && [ ! -f release/latest-linux.yml ]; then
            echo "::warning::latest.yml not found — in-app auto-update may not work until electron-builder publish metadata is present"
            ls -la release/ || true
          fi

      - name: Publish GitHub Release (all platforms at once)
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
