appId: com.prism.desktop
productName: PRISM
copyright: Copyright © 2026 PRISM

directories:
  output: release
  buildResources: build

files:
  - desktop/dist/**/*
  - ui/dist/**/*
  - build/**/*
  - package.json
  # electron-updater and its runtime deps (not bundled by default when files is explicit)
  - node_modules/electron-updater/**/*
  - node_modules/builder-util-runtime/**/*
  - node_modules/fs-extra/**/*
  - node_modules/graceful-fs/**/*
  - node_modules/jsonfile/**/*
  - node_modules/universalify/**/*
  - node_modules/js-yaml/**/*
  - node_modules/argparse/**/*
  - node_modules/lazy-val/**/*
  - node_modules/lodash.escaperegexp/**/*
  - node_modules/lodash.isequal/**/*
  - node_modules/semver/**/*
  - node_modules/tiny-typed-emitter/**/*
  - node_modules/debug/**/*
  - node_modules/ms/**/*
  - node_modules/sax/**/*

extraMetadata:
  main: desktop/dist/main.js

win:
  icon: build/icon.ico
  # Must stay true so electron-builder embeds the PRISM icon into PRISM.exe and
  # builds a valid NSIS installer. Editing the .exe AFTER build (rcedit) corrupts
  # the NSIS integrity check -> "integrity check failed" on launch.
  signAndEditExecutable: true
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: PRISM-Setup-x64.${ext}

mac:
  target:
    - dmg
    - zip
  artifactName: PRISM-mac-x64.${ext}
  category: public.app-category.developer-tools

linux:
  icon: build/icon.png
  target:
    - tar.gz
    - AppImage
  artifactName: PRISM-linux-x64.${ext}
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

publish:
  provider: github
  owner: ProfessionalQwerty
  repo: ProjectPrism
