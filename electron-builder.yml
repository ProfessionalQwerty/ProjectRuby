appId: com.prism.desktop
productName: PRISM
copyright: Copyright © 2026 PRISM

directories:
  output: release
  buildResources: build

files:
  - desktop/dist/**/*
  - ui/dist/**/*
  - build/**/*
  - package.json

extraMetadata:
  main: desktop/dist/main.js

win:
  icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: PRISM-Setup-x64.${ext}

mac:
  target:
    - dmg
    - zip
  artifactName: PRISM-mac-x64.${ext}
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
    - tar.gz
  artifactName: PRISM-linux-x64.${ext}
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

publish:
  provider: github
  owner: ProfessionalQwerty
  repo: ProjectRuby
