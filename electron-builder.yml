appId: com.prism.desktop
productName: PRISM
copyright: Copyright © 2026 PRISM

directories:
  output: release
  buildResources: build

# Native .node binaries cannot execute from inside app.asar — extract to app.asar.unpacked
asar: true
asarUnpack:
  - "**/node_modules/node-pty/**"
  - "**/node-pty/**"
  - "**/prebuilds/**"
  - "**/build/Release/**"
  - "**/*.node"

# node-pty is copied into desktop/dist via scripts/copy-main-deps.mjs (not root dependencies)
npmRebuild: false

files:
  - desktop/dist/**/*
  - ui/dist/**/*
  - build/**/*
  - package.json

extraMetadata:
  main: desktop/dist/main.js

win:
  icon: build/icon.ico
  # Must stay true so electron-builder embeds the PRISM icon into PRISM.exe and
  # builds a valid NSIS installer. Editing the .exe AFTER build (rcedit) corrupts
  # the NSIS integrity check -> "integrity check failed" on launch.
  signAndEditExecutable: true
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: PRISM-Setup-x64.${ext}

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  artifactName: PRISM-mac-${arch}.${ext}
  category: public.app-category.developer-tools

linux:
  icon: build/icon.png
  target:
    - tar.gz
    - AppImage
  artifactName: PRISM-linux-x64.${ext}
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

publish:
  provider: github
  owner: ProfessionalQwerty
  repo: ProjectPrism

extraResources:
  - from: bin/rtk/win32
    to: rtk
    filter:
      - "**/*"
  - from: bin/rtk/darwin
    to: rtk
    filter:
      - "**/*"
  - from: bin/rtk/linux
    to: rtk
    filter:
      - "**/*"
